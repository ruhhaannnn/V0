<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IQWR | KINETIC REELS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0a0a0a;
            --bg-panel: #141414;
            --text-primary: #e5e5e5;
            --text-muted: #888888;
            --accent: #2563eb;
            --border-color: #262626;
            --normal: #22c55e;
            --font-mono: 'SF Mono', 'Monaco', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: white; }

        .app-container { position: relative; width: 100%; height: 100%; }
        
        .post-feed {
            width: 100%;
            height: 100dvh; 
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .post-feed::-webkit-scrollbar { display: none; }
        .post-feed { -ms-overflow-style: none; scrollbar-width: none; }

        .post-container {
            width: 100%;
            height: 100dvh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        .media-content {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background: #000;
        }

        .post-info {
            position: absolute;
            bottom: 110px; 
            left: 15px;
            right: 15px;
            z-index: 5;
            padding: 0 10px;
            background: transparent;
            pointer-events: none; 
        }
        
        .time-ago-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-family: var(--font-mono);
            font-weight: bold;
            color: var(--normal);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
        }
        
        .pulse { height: 8px; width: 8px; background-color: var(--normal); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; margin-right: 10px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .post-info p { 
            font-size: 0.95rem; 
            color: #fff;
            opacity: 0.95; 
            line-height: 1.4; 
            margin-top: 4px;
            max-height: 120px;
            overflow-y: auto;
            pointer-events: auto; 
            text-shadow: 1px 1px 4px rgba(0,0,0,1);
        }

        .top-btn {
            position: absolute; top: 30px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; width: 45px; height: 45px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 50; backdrop-filter: blur(5px);
        }
        .back-btn { left: 20px; text-decoration: none; }
        .mute-btn { right: 20px; }

        /* Original Menu Bar */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; 
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(20px) saturate(200%); -webkit-backdrop-filter: blur(20px) saturate(200%);
            padding: 10px 20px; border-radius: 40px;
            border: 1px solid rgba(234, 179, 8, 0.6); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(234, 179, 8, 0.4), inset 0 0 15px rgba(234, 179, 8, 0.2);
            z-index: 999999 !important; 
        }
        .nav-item {
            display: flex; align-items: center; justify-content: center;
            color: #f8fafc; padding: 10px; border-radius: 50%; 
            cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .nav-item:hover { background: rgba(234, 179, 8, 0.2); color: #fef08a; }
        .nav-item.active-nav { background: rgba(234, 179, 8, 0.4); box-shadow: inset 0 0 12px rgba(234, 179, 8, 0.6); color: #fef08a; }
        .nav-item svg { width: 20px; height: 20px; stroke: currentColor; }
        .live-dot { width: 6px; height: 6px; background-color: #ef4444; border-radius: 50%; position: absolute; top: 4px; right: 4px; animation: pulse 1s infinite; }

        @media (max-width: 400px) {
            .bottom-nav { width: 90%; max-width: 400px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="post-feed" id="postFeed"></div>

    <nav class="bottom-nav" id="main-nav">
        <a href="index.html#map-section" class="nav-item" title="Map">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
        </a>
        <a href="index.html#news-section" class="nav-item" title="News">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><line x1="8" y1="11" x2="16" y2="11"></line><line x1="8" y1="15" x2="16" y2="15"></line><line x1="8" y1="7" x2="10" y2="7"></line></svg>
        </a>
        <a href="index.html#live-section" class="nav-item" title="Live">
            <div class="live-dot"></div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
        </a>
        <a href="index.html#stats-section" class="nav-item" title="Stats">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
        </a>
        <a href="index.html#airspace-section" class="nav-item" title="Airspace">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-.5-.5-2.5 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6.5 4.5L6 16l-2.5-1-1.5 1 2.5 4 4 2.5 1-1.5-1-2.5 3.5-3.5 8 6.5.5-1.5-.2-1z"></path></svg>
        </a>
        <a href="#" class="nav-item active-nav" title="Reels">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
        </a>
    </nav>
</div>

<script>
    let globalMuted = true;
    let allVideoPosts = JSON.parse(localStorage.getItem('iqwr_video_cache')) || [];

    const iconMuted = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`;
    const iconUnmuted = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;

    function renderPostFeed() {
        const feed = document.getElementById('postFeed');
        feed.innerHTML = allVideoPosts.map(post => `
            <div class="post-container">
                <video src="${post.videoSrc}" 
                       class="media-content" 
                       loop playsinline 
                       preload="auto" 
                       muted 
                       crossorigin="anonymous"
                       onclick="toggleGlobalMute()"></video>
                <div class="top-btn mute-btn" onclick="toggleGlobalMute()">${globalMuted ? iconMuted : iconUnmuted}</div>
                <div class="post-info">
                    <div class="time-ago-header"><span class="pulse"></span>LIVE STREAM</div>
                    <p>${post.text}</p>
                </div>
            </div>`).join('');
        setupIntersectionObserver();
    }

    function setupIntersectionObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                    video.currentTime = 0; // Reset for instant play on scroll back
                }
            });
        }, { threshold: 0.5 });
        document.querySelectorAll('.post-container').forEach(c => observer.observe(c));
    }

    window.toggleGlobalMute = function() {
        globalMuted = !globalMuted;
        document.querySelectorAll('.media-content').forEach(v => v.muted = globalMuted);
        document.querySelectorAll('.mute-btn').forEach(b => b.innerHTML = globalMuted ? iconMuted : iconUnmuted);
    };

    if (allVideoPosts.length > 0) renderPostFeed();
</script>
</body>
</html>
